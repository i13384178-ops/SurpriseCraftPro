<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SurpriseCraft Pro — Onvergetelijke Digitale Verrassingen</title>
<meta name="description" content="Persoonlijke verrassing websites voor verjaardagen, liefdesboodschappen en speciale momenten.">
<meta property="og:title" content="SurpriseCraft Pro">
<meta property="og:description" content="Create unforgettable digital surprises">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
:root{
--bg:#0f0b1a;--bg2:#1a1333;--bg3:#241d40;
--card:#1e1740;--card2:#2a2050;
--border:#3d2d6b;--text:#e8e0ff;--text2:#b8a8e0;--muted:#7a6aaa;
--primary:#818cf8;--primary2:#6366f1;
--accent:#a78bfa;--accent2:#7c3aed;
--emerald:#34d399;--emerald2:#059669;
--pink:#f472b6;--pink2:#ec4899;
--rose:#fb7185;--amber:#fbbf24;
--shadow:rgba(99,102,241,0.15);
--g1:linear-gradient(135deg,#6366f1,#a78bfa,#ec4899);
--g2:linear-gradient(135deg,#1e1740,#2a2050);
--r:16px;--rs:10px;
--tr:all .3s cubic-bezier(.4,0,.2,1);
--f1:'Space Grotesk','Inter',sans-serif;
--f2:'Inter',sans-serif;
}
.light{
--bg:#f8f7ff;--bg2:#eeeaff;--bg3:#e4deff;
--card:#fff;--card2:#f3f0ff;
--border:#d4c8f0;--text:#1a1333;--text2:#4a3d6b;--muted:#8a7daa;
--shadow:rgba(99,102,241,.1);
--g2:linear-gradient(135deg,#fff,#f3f0ff);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--f2);background:var(--bg);color:var(--text);line-height:1.6;overflow-x:hidden;transition:background .4s,color .4s}
h1,h2,h3,h4,h5{font-family:var(--f1)}
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--primary);border-radius:4px}

#app-loader{position:fixed;inset:0;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);transition:opacity .6s,visibility .6s}
#app-loader.hide{opacity:0;visibility:hidden;pointer-events:none}
.loader-heart{font-size:56px;animation:ldP .8s infinite alternate}
.loader-text{margin-top:16px;font-family:var(--f1);font-size:20px;color:var(--primary);font-weight:600}
.loader-bar{width:200px;height:4px;background:var(--bg3);border-radius:4px;margin-top:20px;overflow:hidden}
.loader-bar-inner{width:0%;height:100%;background:var(--g1);border-radius:4px;animation:ldB 1.5s ease forwards}
@keyframes ldP{0%{transform:scale(1)}100%{transform:scale(1.3)}}
@keyframes ldB{0%{width:0}100%{width:100%}}

.navbar{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(15,11,26,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 40px;height:70px;display:flex;align-items:center;justify-content:space-between;transition:var(--tr)}
.light .navbar{background:rgba(248,247,255,.9)}
.nav-brand{font-family:var(--f1);font-size:22px;font-weight:700;background:var(--g1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;cursor:pointer}
.nav-links{display:flex;gap:8px;list-style:none}
.nav-links li a{color:var(--text2);text-decoration:none;font-size:14px;font-weight:500;padding:8px 14px;border-radius:8px;transition:var(--tr);cursor:pointer}
.nav-links li a:hover,.nav-links li a.active{color:var(--primary);background:rgba(99,102,241,.1)}
.nav-right{display:flex;align-items:center;gap:10px}
.nav-toggle{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:8px;font-size:13px;cursor:pointer;transition:var(--tr);font-family:var(--f2)}
.nav-toggle:hover{border-color:var(--primary);color:var(--primary)}
.hamburger{display:none;background:none;border:none;color:var(--text);font-size:24px;cursor:pointer}
.mobile-menu{display:none;position:fixed;top:70px;left:0;right:0;background:var(--bg);border-bottom:1px solid var(--border);padding:20px;z-index:999;flex-direction:column;gap:4px}
.mobile-menu.open{display:flex}
.mobile-menu a{color:var(--text2);text-decoration:none;padding:12px 16px;border-radius:8px;font-size:15px;transition:var(--tr);cursor:pointer}
.mobile-menu a:hover{background:rgba(99,102,241,.1);color:var(--primary)}
.light .mobile-menu{background:var(--bg)}

.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:100px 40px 60px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(99,102,241,.15),transparent 70%);top:-100px;right:-100px;border-radius:50%;animation:bF 8s infinite alternate}
.hero::after{content:'';position:absolute;width:400px;height:400px;background:radial-gradient(circle,rgba(236,72,153,.12),transparent 70%);bottom:-50px;left:-50px;border-radius:50%;animation:bF 10s infinite alternate-reverse}
@keyframes bF{0%{transform:translate(0,0) scale(1)}100%{transform:translate(40px,-40px) scale(1.15)}}
.hero-inner{max-width:800px;text-align:center;position:relative;z-index:2}
.hero-badge{display:inline-block;background:rgba(99,102,241,.15);color:var(--primary);padding:8px 20px;border-radius:50px;font-size:13px;font-weight:600;margin-bottom:24px;border:1px solid rgba(99,102,241,.2)}
.hero h1{font-size:clamp(32px,6vw,56px);font-weight:700;line-height:1.2;margin-bottom:24px}
.hero .hl{background:var(--g1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{font-size:clamp(16px,2.5vw,20px);color:var(--text2);max-width:600px;margin:0 auto 32px;line-height:1.7}
.hero-btns{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.btn{font-family:var(--f2);padding:14px 32px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;border:none;transition:var(--tr)}
.btn-primary{background:var(--g1);color:#fff}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px var(--shadow)}
.btn-secondary{background:transparent;color:var(--primary);border:2px solid var(--border)}
.btn-secondary:hover{border-color:var(--primary);background:rgba(99,102,241,.1)}
.hero-stats{display:flex;gap:40px;justify-content:center;margin-top:48px}
.hero-stat-num{font-size:28px;font-weight:700;color:var(--primary)}
.hero-stat-lbl{font-size:13px;color:var(--muted)}

.section{max-width:1100px;margin:0 auto;padding:80px 40px}
.section-badge{display:inline-block;background:rgba(99,102,241,.12);color:var(--primary);padding:6px 16px;border-radius:50px;font-size:12px;font-weight:600;margin-bottom:16px;border:1px solid rgba(99,102,241,.15)}
.section-title{font-size:clamp(28px,4vw,40px);font-weight:700;margin-bottom:40px}

.about-grid{display:grid;grid-template-columns:auto 1fr;gap:40px;align-items:center}
.about-avatar{width:200px;height:200px;border-radius:50%;background:var(--g1);display:flex;align-items:center;justify-content:center;font-size:80px;box-shadow:0 0 60px var(--shadow)}
.about-text p{color:var(--text2);margin-bottom:16px;font-size:16px;line-height:1.8}
.about-stats{display:flex;gap:24px;margin-top:24px}
.about-stat{background:var(--card);padding:16px;border-radius:12px;border:1px solid var(--border);text-align:center;min-width:100px}
.about-stat-num{font-size:22px;font-weight:700;color:var(--primary)}
.about-stat-lbl{font-size:12px;color:var(--muted)}

.services-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px}
.service-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:32px 24px;transition:var(--tr);text-align:center}
.service-card:hover{transform:translateY(-4px);border-color:var(--primary);box-shadow:0 12px 32px var(--shadow)}
.service-icon{font-size:48px;margin-bottom:16px}
.service-card h3{font-size:18px;margin-bottom:10px}
.service-card p{font-size:14px;color:var(--text2);line-height:1.6}

.demo-filter{display:flex;gap:8px;justify-content:center;margin-bottom:32px;flex-wrap:wrap}
.demo-filter button{background:var(--card);color:var(--text2);border:1px solid var(--border);padding:8px 20px;border-radius:50px;font-size:13px;cursor:pointer;transition:var(--tr);font-family:var(--f2)}
.demo-filter button.active,.demo-filter button:hover{background:var(--primary);color:#fff;border-color:var(--primary)}
.demo-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px}
.demo-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:var(--tr)}
.demo-card:hover{transform:translateY(-4px);box-shadow:0 12px 32px var(--shadow)}
.demo-cover{height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
.demo-type{position:absolute;top:12px;right:12px;background:rgba(0,0,0,.4);color:#fff;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;backdrop-filter:blur(4px)}
.demo-info{padding:20px}
.demo-info h3{font-size:18px;margin-bottom:6px}
.demo-info p{font-size:13px;color:var(--text2);margin-bottom:14px}
.demo-btns{display:flex;gap:8px;flex-wrap:wrap}
.demo-btn{font-family:var(--f2);padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--card2);color:var(--text);text-decoration:none;transition:var(--tr)}
.demo-btn:hover{border-color:var(--primary);color:var(--primary)}
.demo-btn.primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.demo-btn.wa{background:#25d366;color:#fff;border-color:#25d366}

.demo-viewer{position:fixed;inset:0;z-index:2000;background:var(--bg);display:flex;flex-direction:column}
.demo-viewer-bar{height:50px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px;font-size:14px}
.demo-viewer-bar button{background:var(--primary);color:#fff;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-family:var(--f2);font-size:13px;font-weight:500}

.pricing-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;max-width:900px;margin:0 auto}
.pricing-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:32px 28px;transition:var(--tr);position:relative}
.pricing-card:hover{transform:translateY(-4px);box-shadow:0 12px 32px var(--shadow)}
.pricing-card.featured{border-color:var(--primary);box-shadow:0 0 40px var(--shadow)}
.pricing-pop{position:absolute;top:-12px;right:20px;background:var(--g1);color:#fff;padding:4px 16px;border-radius:50px;font-size:12px;font-weight:600}
.pricing-name{font-size:20px;font-weight:700;margin-bottom:8px}
.pricing-price{font-size:32px;font-weight:700;color:var(--primary);margin-bottom:20px}
.pricing-features{list-style:none;margin-bottom:24px}
.pricing-features li{padding:6px 0;font-size:14px;color:var(--text2)}
.pricing-features li::before{content:'✓ ';color:var(--emerald);font-weight:700}
.pricing-cta{padding:12px 24px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:var(--tr);font-family:var(--f2)}
.pc-primary{background:var(--g1);color:#fff}
.pc-secondary{background:var(--card2);color:var(--text);border:1px solid var(--border)}

.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:40px;max-width:900px;margin:0 auto}
.contact-form{display:flex;flex-direction:column;gap:16px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:13px;font-weight:600;color:var(--text2)}
.form-group input,.form-group textarea{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-size:14px;font-family:var(--f2);transition:var(--tr)}
.form-group input:focus,.form-group textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(99,102,241,.15)}
.form-group textarea{min-height:120px;resize:vertical}
.form-submit{background:var(--g1);color:#fff;border:none;padding:14px 28px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:var(--tr);font-family:var(--f2)}
.form-submit:hover{transform:translateY(-2px);box-shadow:0 8px 24px var(--shadow)}
.contact-info{display:flex;flex-direction:column;gap:16px}
.contact-info-card{display:flex;gap:14px;align-items:center;padding:16px;background:var(--card);border:1px solid var(--border);border-radius:12px}
.contact-info-icon{font-size:24px}
.contact-info-card h4{font-size:14px;font-weight:600}
.contact-info-card p{font-size:13px;color:var(--text2)}

.footer{text-align:center;padding:40px 20px;border-top:1px solid var(--border);margin-top:60px}
.footer-brand{font-family:var(--f1);font-size:20px;font-weight:700;background:var(--g1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;cursor:pointer;margin-bottom:16px}
.footer-socials{display:flex;gap:16px;justify-content:center;margin-bottom:16px}
.footer-socials a{font-size:20px;text-decoration:none;transition:var(--tr)}
.footer-socials a:hover{transform:scale(1.2)}
.footer-disc{font-size:12px;color:var(--muted);margin-bottom:8px}
.footer-copy{font-size:11px;color:var(--muted)}

.fh{position:fixed;bottom:-50px;opacity:0;animation:fhF linear infinite;pointer-events:none;z-index:0}
@keyframes fhF{0%{opacity:0;transform:translateY(0) rotate(0)}10%{opacity:.6}90%{opacity:.1}100%{opacity:0;transform:translateY(-110vh) rotate(360deg)}}

.wa-float{position:fixed;bottom:24px;right:24px;z-index:999;width:56px;height:56px;border-radius:50%;background:#25d366;display:flex;align-items:center;justify-content:center;font-size:28px;text-decoration:none;box-shadow:0 4px 16px rgba(37,211,102,.4);transition:var(--tr);animation:waP 2s infinite}
.wa-float:hover{transform:scale(1.1)}
@keyframes waP{0%,100%{box-shadow:0 4px 16px rgba(37,211,102,.4)}50%{box-shadow:0 4px 32px rgba(37,211,102,.6)}}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--primary);color:#fff;padding:12px 28px;border-radius:12px;font-size:14px;font-weight:600;z-index:9999;transition:var(--tr);opacity:0;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Admin styles */
.admin-wrap{max-width:1100px;margin:0 auto;padding:90px 20px 40px}
.admin-login{display:flex;justify-content:center;align-items:center;min-height:80vh}
.admin-login-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:40px;text-align:center;max-width:400px;width:100%}
.admin-login-card h2{margin-bottom:8px}
.admin-login-card p{color:var(--text2);font-size:14px;margin-bottom:20px}
.admin-login-card input{width:100%;padding:12px 16px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;margin-bottom:12px;font-family:var(--f2)}
.admin-login-card button{width:100%;padding:12px;border-radius:10px;background:var(--g1);color:#fff;border:none;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--f2)}
.admin-login-err{color:var(--rose);font-size:13px;margin-top:8px}
.admin-tabs{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap;border-bottom:1px solid var(--border);padding-bottom:12px}
.admin-tab{background:var(--card);color:var(--text2);border:1px solid var(--border);padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer;transition:var(--tr);font-family:var(--f2);white-space:nowrap}
.admin-tab:hover{border-color:var(--primary);color:var(--primary)}
.admin-tab.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.admin-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:24px;margin-bottom:16px}
.admin-card h3{margin-bottom:16px;font-size:20px}
.admin-stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
.admin-stat{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center}
.admin-stat-num{font-size:28px;font-weight:700;color:var(--primary)}
.admin-stat-lbl{font-size:13px;color:var(--muted);margin-top:4px}
.admin-msg-list{display:flex;flex-direction:column;gap:10px}
.admin-msg{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:16px}
.admin-msg h4{font-size:15px;margin-bottom:6px}
.admin-msg-t{font-size:13px;color:var(--text2)}
.admin-msg-a{display:flex;gap:8px;margin-top:10px}
.admin-msg-btn{padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--card2);color:var(--text);transition:var(--tr);font-family:var(--f2)}
.admin-msg-btn:hover{border-color:var(--primary)}
.admin-msg-btn.del{border-color:var(--rose);color:var(--rose)}

.adm-demo-list{display:flex;flex-direction:column;gap:10px}
.adm-demo-item{display:flex;align-items:center;gap:16px;padding:16px;background:var(--bg);border:1px solid var(--border);border-radius:10px;flex-wrap:wrap}
.adm-demo-item h4{font-size:15px}
.adm-demo-item p{font-size:12px;color:var(--muted);margin-top:2px}
.adm-demo-btns{display:flex;gap:6px;flex-wrap:wrap}
.adm-save{padding:8px 16px;border-radius:8px;background:var(--g1);color:#fff;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:var(--tr);font-family:var(--f2)}
.adm-save:hover{transform:translateY(-1px);box-shadow:0 4px 12px var(--shadow)}
.adm-del{padding:8px 16px;border-radius:8px;background:rgba(251,113,133,.15);color:var(--rose);border:1px solid var(--rose);font-size:13px;cursor:pointer;transition:var(--tr);font-family:var(--f2)}
.adm-clone{padding:8px 16px;border-radius:8px;background:rgba(52,211,153,.15);color:var(--emerald);border:1px solid var(--emerald);font-size:13px;cursor:pointer;transition:var(--tr);font-family:var(--f2)}

.modal-overlay{position:fixed;inset:0;z-index:5000;background:rgba(0,0,0,.6);display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto;backdrop-filter:blur(4px)}
.modal-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:32px;max-width:900px;width:100%;position:relative;margin:auto}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--text);font-size:20px;cursor:pointer}
.adm-section{margin:16px 0;padding:16px;background:var(--bg);border:1px solid var(--border);border-radius:10px}
.adm-section h4{font-size:14px;color:var(--primary);margin-bottom:10px}
.adm-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px}
.adm-lbl{font-size:12px;font-weight:600;color:var(--text2);margin:6px 0 2px;display:block}
.adm-input{width:100%;padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px;font-family:var(--f2)}
.adm-input:focus{outline:none;border-color:var(--primary)}
.adm-ta{width:100%;padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px;font-family:var(--f2);min-height:70px;resize:vertical}
.adm-ta:focus{outline:none;border-color:var(--primary)}

.photo-manager{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.photo-item{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:13px}
.photo-item img{width:40px;height:40px;object-fit:cover;border-radius:6px}
.photo-item-del{background:none;border:none;color:var(--rose);cursor:pointer;font-size:16px;padding:0 4px;line-height:1}
.photo-add-row{display:flex;gap:6px;margin-top:8px;align-items:center}
.photo-add-row input{flex:1;padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px;font-family:var(--f2)}
.photo-add-btn{padding:8px 14px;border-radius:8px;background:var(--emerald);color:#fff;border:none;font-size:13px;cursor:pointer;font-family:var(--f2);white-space:nowrap}

@media(max-width:768px){
.nav-links{display:none}.hamburger{display:block}
.hero{padding:100px 20px 40px}
.hero-stats{gap:20px}
.about-grid{grid-template-columns:1fr;text-align:center}
.about-avatar{margin:0 auto}
.contact-grid{grid-template-columns:1fr}
